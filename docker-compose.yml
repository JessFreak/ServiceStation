services:
  db:
    image: postgres:15-alpine
    container_name: service-station-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: servicestation
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d servicestation"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "8080:8080"
    env_file:
      - path: ./back/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://user:password@db:5432/servicestation?schema=public"
      DB_HOST: db
      DB_PORT: 5432
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: service-station-frontend
    ports:
      - "80:80"
    depends_on:
      - app